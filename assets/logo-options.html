<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* Exact sketch: E normal, D stretched tall, C normal */
    .edc-sketch {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    /* E - normal height, left side */
    .edc-sketch .e-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 280px;
    }
    
    .edc-sketch .e-box span {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    
    /* D - stretched tall, center */
    .edc-sketch .d-box {
      font-size: 360px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.85;
      margin: 0 -10px;
      position: relative;
      z-index: 2;
    }
    
    /* C - normal height, right side */
    .edc-sketch .c-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 280px;
    }
    
    .edc-sketch .c-box span {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    
    /* Refined version with crossbar emphasis */
    .edc-refined {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .edc-refined .e-side {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 300px;
    }
    
    .edc-refined .d-center {
      font-size: 400px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.82;
      margin: 0 -15px;
      position: relative;
    }
    
    .edc-refined .c-side {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 300px;
    }
    
    /* Crossbar accent */
    .crossbar-line {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 20px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    /* Clean version without crossbar */
    .edc-clean {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .edc-clean .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      align-self: center;
    }
    
    .edc-clean .d {
      font-size: 380px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.85;
      margin: 0 -10px;
    }
    
    .edc-clean .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      align-self: center;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: Exact sketch match -->
  <div class="version">
    <h3>Version 1: Your sketch (E normal, D tall, C normal)</h3>
    <div class="edc-clean">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: With crossbar accent -->
  <div class="version">
    <h3>Version 2: With horizontal crossbar</h3>
    <div class="edc-refined" style="position: relative;">
      <span class="crossbar-line"></span>
      <span class="e-side">E</span>
      <span class="d-center">D</span>
      <span class="c-side">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
