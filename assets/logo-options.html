<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* Only height changes, width stays same */
    .edc-stretch {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* E - normal */
    .edc-stretch .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* D - same font size, stretched ONLY vertically with scaleY */
    .edc-stretch .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      transform: scaleY(3);
      transform-origin: center;
      margin: 0 10px;
    }
    
    /* C - normal */
    .edc-stretch .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* With crossbar */
    .edc-crossbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .edc-crossbar .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .edc-crossbar .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(3);
      transform-origin: center;
      margin: 0 10px;
      position: relative;
      z-index: 2;
    }
    
    .edc-crossbar .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .edc-crossbar .bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 20px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    /* With gaps */
    .edc-gapped {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    
    .edc-gapped .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .edc-gapped .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(3);
      transform-origin: center;
    }
    
    .edc-gapped .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    /* Different scale ratios */
    .edc-ratio {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .edc-ratio .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    /* scaleY(2.5) for 1:2 ratio (top:bottom) */
    .edc-ratio .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(2.5);
      transform-origin: center;
    }
    
    .edc-ratio .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: scaleY(3) - only height stretches -->
  <div class="version">
    <h3>Version 1: D height only (scaleY 3x)</h3>
    <div class="edc-stretch">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: With crossbar -->
  <div class="version">
    <h3>Version 2: With horizontal crossbar</h3>
    <div class="edc-crossbar">
      <span class="bar"></span>
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 3: 1:2 ratio scale -->
  <div class="version">
    <h3>Version 3: Latin cross ratio (scaleY 2.5x)</h3>
    <div class="edc-ratio">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
