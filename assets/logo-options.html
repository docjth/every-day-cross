<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* Latin cross proportions: vertical 3x, horizontal 1x, centered */
    .cross-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* The D as cross outline */
    .d-cross-shape {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Top of cross - shorter */
    .d-cross-shape .cross-top {
      font-size: 120px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      height: 80px;
      display: flex;
      align-items: flex-end;
    }
    
    /* Middle with arms - E D C */
    .d-cross-shape .cross-arms {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }
    
    .d-cross-shape .cross-arms .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      margin-right: -10px;
    }
    
    .d-cross-shape .cross-arms .d {
      font-size: 200px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      position: relative;
      z-index: 2;
    }
    
    .d-cross-shape .cross-arms .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      margin-left: -10px;
    }
    
    /* Horizontal bar behind */
    .d-cross-shape .cross-arms::before {
      content: '';
      position: absolute;
      left: -40px;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      height: 24px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    /* Bottom of cross - longer */
    .d-cross-shape .cross-bottom {
      font-size: 200px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      height: 160px;
      display: flex;
      align-items: flex-start;
    }
    
    /* Simpler version: D forms the cross outline */
    .simple-cross {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .simple-cross .d-vertical {
      font-size: 360px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.85;
      position: relative;
    }
    
    .simple-cross .horizontal-arm {
      position: absolute;
      left: 50%;
      top: 32%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 60px;
    }
    
    .simple-cross .horizontal-arm .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .simple-cross .horizontal-arm .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .simple-cross .crossbar {
      position: absolute;
      left: -80px;
      right: -80px;
      top: 32%;
      transform: translateY(-50%);
      height: 28px;
      background: #1a1a1a;
      z-index: -1;
    }
    
    /* Cleanest: D as cross, E and C attached to arms */
    .clean-cross {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    
    .clean-cross .top-section {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.7;
    }
    
    .clean-cross .middle-section {
      display: flex;
      align-items: center;
      position: relative;
    }
    
    .clean-cross .middle-section .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      margin-right: 10px;
    }
    
    .clean-cross .middle-section .d {
      font-size: 180px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    
    .clean-cross .middle-section .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      margin-left: 10px;
    }
    
    .clean-cross .middle-section::after {
      content: '';
      position: absolute;
      left: -20px;
      right: -20px;
      top: 45%;
      height: 20px;
      background: #1a1a1a;
      z-index: -1;
    }
    
    .clean-cross .bottom-section {
      font-size: 180px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.7;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: D forms cross shape, E and C on horizontal arms -->
  <div class="version">
    <h3>Version 1: D as cross outline, E & C on arms</h3>
    <div class="simple-cross">
      <span class="crossbar"></span>
      <div class="horizontal-arm">
        <span class="e">E</span>
        <span class="c">C</span>
      </div>
      <span class="d-vertical">D</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: Latin cross proportions -->
  <div class="version">
    <h3>Version 2: Latin cross proportions (short top, long bottom)</h3>
    <div class="clean-cross">
      <div class="top-section">D</div>
      <div class="middle-section">
        <span class="e">E</span>
        <span class="d">D</span>
        <span class="c">C</span>
      </div>
      <div class="bottom-section">D</div>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
