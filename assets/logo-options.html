<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 60px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }
    .version {
      background: white;
      padding: 80px 100px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-weight: 400;
    }
    
    /* Latin cross: D positioned with offset transform-origin */
    .edc-latin {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 280px;
      gap: 20px;
      padding-top: 70px;
    }
    
    .edc-latin .e,
    .edc-latin .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      margin-bottom: 0;
    }
    
    /* D: origin at 1/3 from top (not center) for 1:2 ratio */
    .edc-latin .d-box {
      height: 280px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
    }
    
    .edc-latin .d-box .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      transform: scaleY(3);
      transform-origin: 50% 33%;
    }
    
    /* Visual guide version */
    .edc-guide {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 280px;
      gap: 20px;
      padding-top: 70px;
      position: relative;
    }
    
    .edc-guide .e,
    .edc-guide .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    .edc-guide .d-box {
      height: 280px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    
    .edc-guide .d-box .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(3);
      transform-origin: 50% 33%;
    }
    
    /* Center line indicator */
    .center-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 70px;
      height: 2px;
      background: #c4a77d;
      z-index: 10;
    }
    
    /* With crossbar */
    .edc-crossbar {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 280px;
      gap: 20px;
      padding-top: 70px;
      position: relative;
    }
    
    .edc-crossbar .e,
    .edc-crossbar .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      z-index: 2;
    }
    
    .edc-crossbar .d-box {
      height: 280px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    
    .edc-crossbar .d-box .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(3);
      transform-origin: 50% 33%;
      z-index: 2;
    }
    
    .edc-crossbar .bar {
      position: absolute;
      left: 50%;
      top: 70px;
      transform: translateX(-50%);
      width: 350px;
      height: 20px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: Latin cross with offset origin -->
  <div class="version">
    <h3>Version 1: Latin cross (1:2 ratio)</h3>
    <div class="edc-latin">
      <span class="e">E</span>
      <div class="d-box">
        <span class="d">D</span>
      </div>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: With guide line showing center -->
  <div class="version">
    <h3>Version 2: With center line (gold = E/C level)</h3>
    <div class="edc-guide">
      <span class="center-line"></span>
      <span class="e">E</span>
      <div class="d-box">
        <span class="d">D</span>
      </div>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 3: With crossbar -->
  <div class="version">
    <h3>Version 3: With horizontal crossbar</h3>
    <div class="edc-crossbar">
      <span class="bar"></span>
      <span class="e">E</span>
      <div class="d-box">
        <span class="d">D</span>
      </div>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
