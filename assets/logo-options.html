<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* EDC as cross shape */
    .edc-cross {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* E - tall vertical left arm */
    .edc-cross .e {
      font-size: 280px;
      line-height: 0.85;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* D - center, normal size */
    .edc-cross .d {
      font-size: 140px;
      margin: 0 10px;
      display: flex;
      align-items: center;
    }
    
    /* C - tall vertical right arm */
    .edc-cross .c {
      font-size: 280px;
      line-height: 0.85;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* Horizontal bar connecting E-D-C */
    .edc-cross .crossbar {
      position: relative;
    }
    .edc-cross .crossbar::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 20px;
      background: #1a1a1a;
      z-index: -1;
    }
    
    /* Alternative: E and C as vertical, D with crossbar through it */
    .edc-alt {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .edc-alt .e-stretch {
      font-size: 320px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      margin-right: 20px;
    }
    .edc-alt .c-stretch {
      font-size: 320px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      margin-left: 20px;
    }
    .edc-alt .d-center {
      font-size: 160px;
      font-weight: 700;
      color: #1a1a1a;
      position: relative;
    }
    .edc-alt .cross-h {
      position: absolute;
      left: -60px;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      height: 24px;
      background: #1a1a1a;
      z-index: -1;
    }
    
    /* Clean version: stacked E/D/C forming cross silhouette */
    .cross-silhouette {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cross-silhouette .top {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.8;
    }
    .cross-silhouette .middle {
      display: flex;
      align-items: center;
      gap: 40px;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.8;
    }
    .cross-silhouette .bottom {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.8;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: E and C stretched tall, D center -->
  <div class="version">
    <h3>Version 1: E & C tall (vertical arms), D center</h3>
    <div class="edc-cross">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: E and C as vertical pillars, D with crossbar -->
  <div class="version">
    <h3>Version 2: E & C as pillars, crossbar through D</h3>
    <div class="edc-alt">
      <span class="e-stretch">E</span>
      <span class="d-center">
        D
        <span class="cross-h"></span>
      </span>
      <span class="c-stretch">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
