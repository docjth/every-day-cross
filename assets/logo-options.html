<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* EDC cross: D stretched tall, E and C normal */
    .edc-cross {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    
    /* E - normal, sits at top and bottom */
    .edc-cross .e-side {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .edc-cross .e-top {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    .edc-cross .e-bottom {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    
    /* D - stretched tall, the vertical stem */
    .edc-cross .d-center {
      font-size: 320px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      position: relative;
    }
    
    /* C - normal, sits at top and bottom */
    .edc-cross .c-side {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .edc-cross .c-top {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    .edc-cross .c-bottom {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    
    /* Horizontal crossbar through D */
    .crossbar-h {
      position: absolute;
      left: -80px;
      right: -80px;
      top: 50%;
      transform: translateY(-50%);
      height: 20px;
      background: #1a1a1a;
      z-index: -1;
    }
    
    /* Alternative: Single letters arranged as cross */
    .cross-letters {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .cross-letters .top-row {
      display: flex;
      gap: 80px;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    .cross-letters .middle-row {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    .cross-letters .bottom-row {
      display: flex;
      gap: 80px;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
    }
    
    /* D as tall vertical, E and C as horizontal arms */
    .d-vertical {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .d-vertical .d-stem {
      font-size: 360px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.85;
    }
    .d-vertical .e-arm {
      position: absolute;
      left: -100px;
      top: 35%;
      transform: translateY(-50%);
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .d-vertical .c-arm {
      position: absolute;
      right: -100px;
      top: 35%;
      transform: translateY(-50%);
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .d-vertical .crossbar {
      position: absolute;
      left: -60px;
      right: -60px;
      top: 35%;
      transform: translateY(-50%);
      height: 24px;
      background: #1a1a1a;
      z-index: -1;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: D tall vertical, E and C as horizontal arms -->
  <div class="version">
    <h3>Version 1: D stretched tall (vertical), E & C horizontal arms</h3>
    <div class="d-vertical">
      <span class="e-arm">E</span>
      <span class="crossbar"></span>
      <span class="d-stem">D</span>
      <span class="c-arm">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: E top, D middle stretched, C bottom -->
  <div class="version">
    <h3>Version 2: E top / D middle (tall) / C bottom</h3>
    <div class="cross-letters">
      <div class="top-row">
        <span>E</span>
      </div>
      <div class="middle-row">
        <span style="font-size: 280px;">D</span>
      </div>
      <div class="bottom-row">
        <span>C</span>
      </div>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
