<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* All letters same width, D stretched taller */
    .edc-fixed-width {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* E - normal height, fixed width */
    .edc-fixed-width .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      width: 140px;
      text-align: center;
      line-height: 1;
    }
    
    /* D - same width, stretched taller */
    .edc-fixed-width .d {
      font-size: 420px;
      font-weight: 700;
      color: #1a1a1a;
      width: 140px;
      text-align: center;
      line-height: 0.9;
      margin: 0;
    }
    
    /* C - normal height, same width as E and D */
    .edc-fixed-width .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      width: 140px;
      text-align: center;
      line-height: 1;
    }
    
    /* Version with crossbar */
    .edc-crossbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .edc-crossbar .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      width: 140px;
      text-align: center;
    }
    
    .edc-crossbar .d {
      font-size: 420px;
      font-weight: 700;
      color: #1a1a1a;
      width: 140px;
      text-align: center;
      line-height: 0.9;
      position: relative;
      z-index: 2;
    }
    
    .edc-crossbar .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      width: 140px;
      text-align: center;
    }
    
    .edc-crossbar .bar {
      position: absolute;
      left: 50%;
      top: 35%;
      transform: translate(-50%, -50%);
      width: 440px;
      height: 20px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    /* With gaps to show separation */
    .edc-gapped {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .edc-gapped .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      width: 120px;
      text-align: center;
    }
    
    .edc-gapped .d {
      font-size: 420px;
      font-weight: 700;
      color: #1a1a1a;
      width: 120px;
      text-align: center;
      line-height: 0.9;
    }
    
    .edc-gapped .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      width: 120px;
      text-align: center;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: All same width, D stretched -->
  <div class="version">
    <h3>Version 1: E, D, C same width (140px), D stretched tall</h3>
    <div class="edc-fixed-width">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: With crossbar -->
  <div class="version">
    <h3>Version 2: Same width + horizontal crossbar</h3>
    <div class="edc-crossbar">
      <span class="bar"></span>
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 3: With gaps between letters -->
  <div class="version">
    <h3>Version 3: With gaps between letters</h3>
    <div class="edc-gapped">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
