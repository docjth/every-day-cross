<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* EDC outline forms Latin cross */
    .edc-cross-outline {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    /* Top arm: E D C side by side (shorter) */
    .edc-cross-outline .cross-top {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      font-size: 100px;
      line-height: 0.9;
      height: 90px;
    }
    
    /* Center: E D C (wider) */
    .edc-cross-outline .cross-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 140px;
      line-height: 1;
    }
    
    /* Vertical stem: D continues down (longer) */
    .edc-cross-outline .cross-stem {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 140px;
      line-height: 0.9;
    }
    
    .edc-cross-outline .cross-stem .d {
      height: 130px;
      display: flex;
      align-items: flex-start;
    }
    
    /* Clean version: precise Latin cross proportions */
    .latin-cross {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    /* Short top arm */
    .latin-cross .top {
      display: flex;
      gap: 8px;
      font-size: 100px;
      line-height: 0.8;
      height: 80px;
    }
    
    /* Center with full width */
    .latin-cross .middle {
      display: flex;
      gap: 8px;
      font-size: 140px;
      line-height: 1;
    }
    
    /* Long vertical stem */
    .latin-cross .stem {
      font-size: 140px;
      line-height: 0.85;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .latin-cross .stem span {
      height: 120px;
      display: flex;
      align-items: flex-start;
    }
    
    /* Geometric version: boxes forming cross */
    .geo-cross {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .geo-cross .arm-top {
      display: flex;
      gap: 4px;
    }
    
    .geo-cross .arm-top span {
      font-size: 110px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    
    .geo-cross .center-section {
      display: flex;
      gap: 4px;
    }
    
    .geo-cross .center-section span {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .geo-cross .stem-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .geo-cross .stem-section span {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      height: 130px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: EDC outline = Latin cross -->
  <div class="version">
    <h3>Version 1: EDC letters form Latin cross outline</h3>
    <div class="latin-cross">
      <div class="top">
        <span>E</span>
        <span>D</span>
        <span>C</span>
      </div>
      <div class="middle">
        <span>E</span>
        <span>D</span>
        <span>C</span>
      </div>
      <div class="stem">
        <span>D</span>
        <span>D</span>
      </div>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: Geometric grid version -->
  <div class="version">
    <h3>Version 2: Geometric cross grid</h3>
    <div class="geo-cross">
      <div class="arm-top">
        <span>E</span>
        <span>D</span>
        <span>C</span>
      </div>
      <div class="center-section">
        <span>E</span>
        <span>D</span>
        <span>C</span>
      </div>
      <div class="stem-section">
        <span>D</span>
        <span>D</span>
      </div>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
