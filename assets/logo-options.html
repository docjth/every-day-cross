<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* VERSION 1: C becomes the cross - C extends down */
    .v1-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .v1 {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.8;
    }
    .v1 .e { margin-right: 8px; }
    .v1 .d { margin-right: 8px; }
    .v1 .c-cross {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }
    .v1 .c-letter {
      font-size: 140px;
      line-height: 0.9;
    }
    .v1 .c-stem {
      width: 20px;
      height: 80px;
      background: #1a1a1a;
      border-radius: 0 0 4px 4px;
      margin-top: -10px;
    }
    .v1 .c-crossbar {
      width: 60px;
      height: 16px;
      background: #1a1a1a;
      border-radius: 4px;
      margin-top: -50px;
    }
    
    /* VERSION 3: Cross integrated through letters */
    .v3-container {
      position: relative;
      display: inline-block;
    }
    .v3 {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      position: relative;
    }
    .v3 .letter {
      position: relative;
      z-index: 2;
      padding: 0 5px;
    }
    .v3 .cross-behind {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .v3 .cross-v {
      width: 16px;
      height: 200px;
      background: #c4a77d;
    }
    .v3 .cross-h {
      width: 320px;
      height: 16px;
      background: #c4a77d;
      margin-top: -108px;
    }
    
    /* VERSION 2: D becomes the cross center */
    .v2 {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      gap: 8px;
    }
    .v2 .d-cross {
      position: relative;
      display: inline-block;
    }
    .v2 .d-letter {
      font-size: 140px;
      position: relative;
      z-index: 2;
    }
    .v2 .cross-through {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }
    .v2 .cross-v {
      width: 14px;
      height: 180px;
      background: #1a1a1a;
      margin: 0 auto;
    }
    .v2 .cross-h {
      width: 100px;
      height: 14px;
      background: #1a1a1a;
      margin: 0 auto;
      margin-top: -97px;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: C extends down to become cross -->
  <div class="version">
    <h3>Version 1: C becomes the cross stem</h3>
    <div class="v1-container">
      <div class="v1">
        <span class="e">E</span>
        <span class="d">D</span>
        <span class="c-cross">
          <span class="c-letter">C</span>
          <div class="c-stem"></div>
          <div class="c-crossbar"></div>
        </span>
      </div>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: D is the cross center -->
  <div class="version">
    <h3>Version 2: Cross through the D</h3>
    <div class="v2">
      <span>E</span>
      <span class="d-cross">
        <span class="d-letter">D</span>
        <div class="cross-through">
          <div class="cross-v"></div>
          <div class="cross-h"></div>
        </div>
      </span>
      <span>C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 3: Gold cross behind all letters -->
  <div class="version">
    <h3>Version 3: Cross behind E-D-C (gold accent)</h3>
    <div class="v3-container">
      <div class="v3">
        <div class="cross-behind">
          <div class="cross-v"></div>
          <div class="cross-h"></div>
        </div>
        <span class="letter">E</span>
        <span class="letter">D</span>
        <span class="letter">C</span>
      </div>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
