<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .version {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }
    
    /* Exact proportions:
       - E width = 100px (reference)
       - D above = 100px (1× E width)
       - D below = 200px (2× E width)
       - E height = 140px
       - C = E (same size)
    */
    
    .edc-exact {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    /* E - reference size */
    .edc-exact .e-box {
      width: 100px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .edc-exact .e-box span {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* D - positioned with exact proportions */
    .edc-exact .d-box {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* D above center (cross top) = 100px */
    .edc-exact .d-box .d-top {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.7;
      height: 100px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }
    
    /* D center (with E and C) */
    .edc-exact .d-box .d-center {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* D below center (cross stem) = 200px */
    .edc-exact .d-box .d-bottom {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.7;
      height: 200px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
    }
    
    /* C - same as E */
    .edc-exact .c-box {
      width: 100px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .edc-exact .c-box span {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* Alternative: Single D stretched */
    .edc-stretch {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .edc-stretch .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      align-self: center;
    }
    
    /* D: total height = 100 + 140 + 200 = 440px equivalent */
    .edc-stretch .d {
      font-size: 420px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      margin: 0 -15px;
    }
    
    .edc-stretch .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      align-self: center;
    }
    
    /* With crossbar at exact center */
    .edc-crossbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .edc-crossbar .e {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .edc-crossbar .d {
      font-size: 420px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 0.9;
      margin: 0 -15px;
      position: relative;
      z-index: 2;
    }
    
    .edc-crossbar .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .edc-crossbar .bar {
      position: absolute;
      left: 50%;
      top: 35%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 20px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: Exact proportions, single D -->
  <div class="version">
    <h3>Version 1: Exact proportions (D top=1×, bottom=2× E width)</h3>
    <div class="edc-stretch">
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: With crossbar at center line -->
  <div class="version">
    <h3>Version 2: With horizontal crossbar</h3>
    <div class="edc-crossbar">
      <span class="bar"></span>
      <span class="e">E</span>
      <span class="d">D</span>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
