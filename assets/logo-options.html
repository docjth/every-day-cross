<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 60px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }
    .version {
      background: white;
      padding: 80px 100px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-weight: 400;
    }
    
    /* Container with fixed heights */
    .edc-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 420px;
      gap: 20px;
    }
    
    /* E and C - normal, centered */
    .edc-container .e,
    .edc-container .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    /* D - contained, only height stretches */
    .edc-container .d-box {
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    
    .edc-container .d-box .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      transform: scaleY(3);
      transform-origin: center;
    }
    
    /* With crossbar */
    .edc-crossbar {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 420px;
      gap: 20px;
      position: relative;
    }
    
    .edc-crossbar .e,
    .edc-crossbar .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      z-index: 2;
    }
    
    .edc-crossbar .d-box {
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .edc-crossbar .d-box .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(3);
      transform-origin: center;
      z-index: 2;
    }
    
    .edc-crossbar .bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      height: 20px;
      background: #1a1a1a;
      z-index: 1;
    }
    
    /* Taller D version */
    .edc-tall {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 500px;
      gap: 20px;
    }
    
    .edc-tall .e,
    .edc-tall .c {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }
    
    .edc-tall .d-box {
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .edc-tall .d-box .d {
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      transform: scaleY(3.5);
      transform-origin: center;
    }
    
    .tagline {
      text-align: center;
      margin-top: 40px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- VERSION 1: Contained, no overlap -->
  <div class="version">
    <h3>Version 1: D contained, no overlap</h3>
    <div class="edc-container">
      <span class="e">E</span>
      <div class="d-box">
        <span class="d">D</span>
      </div>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 2: With crossbar -->
  <div class="version">
    <h3>Version 2: With horizontal crossbar</h3>
    <div class="edc-crossbar">
      <span class="bar"></span>
      <span class="e">E</span>
      <div class="d-box">
        <span class="d">D</span>
      </div>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>

  <!-- VERSION 3: Taller D -->
  <div class="version">
    <h3>Version 3: Taller D (3.5x)</h3>
    <div class="edc-tall">
      <span class="e">E</span>
      <div class="d-box">
        <span class="d">D</span>
      </div>
      <span class="c">C</span>
    </div>
    <div class="tagline">Every Day Cross</div>
  </div>
</body>
</html>
