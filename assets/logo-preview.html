<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .logo-container {
      background: white;
      padding: 60px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .logo {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      font-size: 140px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    .letter {
      position: relative;
    }
    .c-container {
      position: relative;
      display: inline-block;
    }
    .cross {
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      margin-top: 5px;
    }
    .cross-loop {
      width: 16px;
      height: 16px;
      border: 5px solid #1a1a1a;
      border-radius: 50%;
      margin: 0 auto;
      margin-bottom: 4px;
    }
    .cross-stem {
      width: 5px;
      height: 50px;
      background: #1a1a1a;
      margin: 0 auto;
      border-radius: 3px;
    }
    .cross-bar {
      width: 40px;
      height: 5px;
      background: #1a1a1a;
      margin: 0 auto;
      margin-top: -35px;
      border-radius: 3px;
    }
    .tagline {
      text-align: center;
      margin-top: 70px;
      font-size: 18px;
      font-weight: 300;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .dark-version {
      margin-top: 40px;
      background: #1a1a1a;
      padding: 60px 80px;
      border-radius: 12px;
    }
    .dark-version .logo {
      color: white;
    }
    .dark-version .cross-loop {
      border-color: white;
    }
    .dark-version .cross-stem,
    .dark-version .cross-bar {
      background: white;
    }
    .dark-version .tagline {
      color: #aaa;
    }
    h3 {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div>
    <div class="logo-container">
      <h3>Light version (for most uses)</h3>
      <div class="logo">
        <span class="letter">E</span>
        <span class="letter">D</span>
        <span class="c-container">
          C
          <div class="cross">
            <div class="cross-loop"></div>
            <div class="cross-stem"></div>
            <div class="cross-bar"></div>
          </div>
        </span>
      </div>
      <div class="tagline">Every Day Cross</div>
    </div>

    <div class="logo-container dark-version">
      <h3 style="color:#aaa">Dark version (reverse)</h3>
      <div class="logo">
        <span class="letter">E</span>
        <span class="letter">D</span>
        <span class="c-container">
          C
          <div class="cross">
            <div class="cross-loop"></div>
            <div class="cross-stem"></div>
            <div class="cross-bar"></div>
          </div>
        </span>
      </div>
      <div class="tagline">Every Day Cross</div>
    </div>
  </div>
</body>
</html>
